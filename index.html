<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>評論</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  /* ── 基礎 ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:      #1a1a1a;
    --ink-soft: #555;
    --ink-faint:#aaa;
    --paper:    #faf9f7;
    --line:     #e8e4de;
    --accent:   #7c6a52;
    --accent-l: #b5a08a;
    --red:      #9b4444;
    --green:    #4a7c59;
    --radius:   6px;
    --shadow:   0 2px 12px rgba(0,0,0,.06);
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.7;
    padding: 24px 20px 40px;
    min-height: 100vh;
  }

  /* ── 標題 ── */
  .header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 28px;
    padding-bottom: 14px;
    border-bottom: 1.5px solid var(--line);
  }
  .header h2 {
    font-family: 'Noto Serif TC', serif;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: .04em;
    color: var(--ink);
  }
  .comment-count {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: .06em;
  }

  /* ── 留言表單 ── */
  .form-wrap {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 28px;
    box-shadow: var(--shadow);
  }
  .form-wrap.reply-form {
    background: #fdf8f3;
    border-color: var(--accent-l);
    margin-top: 10px;
    margin-left: 32px;
  }
  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .form-label {
    display: block;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: .08em;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  input[type="text"], textarea {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
    resize: none;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent-l);
  }
  .name-field { flex: 0 0 130px; }
  .content-field { flex: 1; }
  textarea { min-height: 72px; }

  .char-counter {
    text-align: right;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 4px;
  }
  .char-counter.warn { color: var(--red); }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }

  /* ── 按鈕 ── */
  button {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    padding: 7px 16px;
    transition: opacity .15s, transform .1s;
    letter-spacing: .03em;
  }
  button:active { transform: scale(.97); }

  .btn-submit {
    background: var(--accent);
    color: #fff;
  }
  .btn-submit:hover { opacity: .85; }
  .btn-submit:disabled { opacity: .4; cursor: default; }

  .btn-cancel {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
  }
  .btn-cancel:hover { background: var(--line); }

  .btn-reply {
    background: transparent;
    color: var(--accent);
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid var(--accent-l);
  }
  .btn-reply:hover { background: #f5ede3; }

  .btn-delete {
    background: transparent;
    color: var(--ink-faint);
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid var(--line);
  }
  .btn-delete:hover { color: var(--red); border-color: var(--red); }

  /* ── 錯誤 / 成功提示 ── */
  .toast {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: var(--radius);
    margin-top: 8px;
    display: none;
  }
  .toast.error { background: #fdf0f0; color: var(--red); border: 1px solid #f0c8c8; }
  .toast.success { background: #f0faf4; color: var(--green); border: 1px solid #bce0cb; }
  .toast.show { display: block; }

  /* ── 留言列表 ── */
  .comments-list { display: flex; flex-direction: column; gap: 0; }

  .comment-item {
    border-bottom: 1px solid var(--line);
    padding: 18px 0 14px;
    animation: fadeIn .25s ease;
  }
  .comment-item:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .comment-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .comment-author {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }
  .comment-time {
    font-size: 11px;
    color: var(--ink-faint);
    flex: 1;
  }
  .comment-actions { display: flex; gap: 6px; }
  .comment-body {
    font-size: 13.5px;
    color: var(--ink-soft);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── 巢狀回覆 ── */
  .replies {
    margin-top: 10px;
    margin-left: 32px;
    padding-left: 16px;
    border-left: 2px solid var(--line);
  }
  .replies .comment-item {
    padding: 12px 0 10px;
  }
  .replies .comment-item:first-child { padding-top: 8px; }

  /* ── 空狀態 ── */
  .empty-state {
    text-align: center;
    padding: 36px 0;
    color: var(--ink-faint);
    font-size: 13px;
    letter-spacing: .04em;
  }

  /* ── 載入中 ── */
  .loading {
    text-align: center;
    padding: 20px;
    color: var(--ink-faint);
    font-size: 12px;
    letter-spacing: .06em;
  }
  .dot-spin {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: .2; }
    50% { opacity: 1; }
  }

  /* ── 刪除確認 ── */
  .delete-confirm {
    font-size: 11px;
    color: var(--red);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .delete-confirm button {
    padding: 2px 8px;
    font-size: 11px;
  }
  .btn-confirm-yes { background: var(--red); color: #fff; }
  .btn-confirm-no  { background: transparent; border: 1px solid var(--line); color: var(--ink-soft); }
</style>
</head>
<body>

<!-- ⚠️ 把你的 Apps Script 部署 URL 貼在這裡 -->
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOZ6aziAIhOvORsQ_noZNN0Ym6fa73V-kCjwL1Mf5ExmprgoEpjJRE9Etg9KdwCCiG/exec';
  const MAX_CONTENT = 500;
  const MAX_AUTHOR  = 20;
</script>

<div class="header">
  <h2>評論</h2>
  <span class="comment-count" id="countLabel"></span>
</div>

<!-- 主要留言表單 -->
<div class="form-wrap" id="mainForm">
  <div class="form-row">
    <div class="name-field">
      <label class="form-label">稱呼</label>
      <input type="text" id="mainAuthor" placeholder="你的名字" maxlength="20">
    </div>
    <div class="content-field">
      <label class="form-label">留言</label>
      <textarea id="mainContent" placeholder="寫下你的想法…" maxlength="500"></textarea>
      <div class="char-counter" id="mainCounter">0 / 500</div>
    </div>
  </div>
  <div id="mainToast" class="toast"></div>
  <div class="form-actions">
    <button class="btn-submit" id="mainSubmit" onclick="submitComment(null)">送出</button>
  </div>
</div>

<!-- 留言列表 -->
<div id="commentsList" class="comments-list">
  <div class="loading"><span class="dot-spin">載入中…</span></div>
</div>

<script>
// ── 資料 ──
let allComments = [];
const PAGE_ID = new URLSearchParams(window.location.search).get('page') || 'default';

// ── 工具 ──
function formatTime(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.className = 'toast', 2800);
}

// ── 字數計數 ──
document.getElementById('mainContent').addEventListener('input', function() {
  const len = this.value.length;
  const el = document.getElementById('mainCounter');
  el.textContent = `${len} / ${MAX_CONTENT}`;
  el.className = `char-counter${len > MAX_CONTENT * .9 ? ' warn' : ''}`;
});

// ── 載入留言 ──
async function loadComments() {
  if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    document.getElementById('commentsList').innerHTML =
      '<div class="empty-state">⚠️ 請先設定 SCRIPT_URL</div>';
    return;
  }
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getComments&pageId=${encodeURIComponent(PAGE_ID)}`);
    const data = await res.json();
    if (data.success) {
      allComments = data.comments;
      renderComments();
    }
  } catch(e) {
    document.getElementById('commentsList').innerHTML =
      '<div class="empty-state">無法連線，請稍後再試</div>';
  }
}

// ── 渲染 ──
function renderComments() {
  const roots = allComments.filter(c => !c.parentId);
  const el = document.getElementById('commentsList');

  const total = allComments.length;
  document.getElementById('countLabel').textContent = total ? `${total} 則` : '';

  if (!roots.length) {
    el.innerHTML = '<div class="empty-state">還沒有留言，來說第一句話吧</div>';
    return;
  }

  el.innerHTML = roots
    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))
    .map(c => renderComment(c, false))
    .join('');
}

function renderComment(c, isReply) {
  const replies = allComments
    .filter(r => r.parentId === c.id)
    .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

  const repliesHtml = replies.length
    ? `<div class="replies">${replies.map(r => renderComment(r, true)).join('')}</div>`
    : '';

  const replyFormId = `replyForm_${c.id}`;

  return `
  <div class="comment-item" id="comment_${c.id}">
    <div class="comment-meta">
      <span class="comment-author">${escHtml(c.author)}</span>
      <span class="comment-time">${formatTime(c.timestamp)}</span>
      <div class="comment-actions">
        ${!isReply ? `<button class="btn-reply" onclick="toggleReplyForm('${c.id}')">回覆</button>` : ''}
        <button class="btn-delete" onclick="confirmDelete('${c.id}')">刪除</button>
      </div>
    </div>
    <div class="comment-body">${escHtml(c.content)}</div>
    <div id="${replyFormId}" style="display:none;"></div>
    ${repliesHtml}
  </div>`;
}

// ── 回覆表單 ──
function toggleReplyForm(parentId) {
  const wrap = document.getElementById(`replyForm_${parentId}`);
  if (wrap.style.display === 'none') {
    wrap.style.display = 'block';
    wrap.innerHTML = `
      <div class="form-wrap reply-form">
        <div class="form-row">
          <div class="name-field">
            <label class="form-label">稱呼</label>
            <input type="text" id="rAuthor_${parentId}" placeholder="你的名字" maxlength="20">
          </div>
          <div class="content-field">
            <label class="form-label">回覆</label>
            <textarea id="rContent_${parentId}" placeholder="回覆…" maxlength="500"
              oninput="updateReplyCounter('${parentId}', this.value.length)"></textarea>
            <div class="char-counter" id="rCounter_${parentId}">0 / 500</div>
          </div>
        </div>
        <div id="rToast_${parentId}" class="toast"></div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="closeReplyForm('${parentId}')">取消</button>
          <button class="btn-submit" id="rSubmit_${parentId}" onclick="submitComment('${parentId}')">送出回覆</button>
        </div>
      </div>`;
    document.getElementById(`rAuthor_${parentId}`).focus();
  } else {
    closeReplyForm(parentId);
  }
}

function closeReplyForm(parentId) {
  const wrap = document.getElementById(`replyForm_${parentId}`);
  wrap.style.display = 'none';
  wrap.innerHTML = '';
}

function updateReplyCounter(parentId, len) {
  const el = document.getElementById(`rCounter_${parentId}`);
  if (el) {
    el.textContent = `${len} / ${MAX_CONTENT}`;
    el.className = `char-counter${len > MAX_CONTENT * .9 ? ' warn' : ''}`;
  }
}

// ── 送出留言 ──
async function submitComment(parentId) {
  const isReply = !!parentId;
  const authorEl  = document.getElementById(isReply ? `rAuthor_${parentId}`  : 'mainAuthor');
  const contentEl = document.getElementById(isReply ? `rContent_${parentId}` : 'mainContent');
  const submitBtn = document.getElementById(isReply ? `rSubmit_${parentId}`  : 'mainSubmit');
  const toastId   = isReply ? `rToast_${parentId}` : 'mainToast';

  const author  = authorEl.value.trim();
  const content = contentEl.value.trim();

  if (!author)  return showToast(toastId, '請填寫稱呼', 'error');
  if (!content) return showToast(toastId, '請填寫留言內容', 'error');

  submitBtn.disabled = true;
  submitBtn.textContent = '送出中…';

  try {
    const params = new URLSearchParams({ action:'addComment', author, content, parentId: parentId||'', pageId: PAGE_ID });
    const res  = await fetch(`${SCRIPT_URL}?${params}`);
    const data = await res.json();

    if (data.success) {
      authorEl.value  = '';
      contentEl.value = '';
      if (isReply) closeReplyForm(parentId);
      await loadComments();
      showToast('mainToast', '留言成功！', 'success');
    } else {
      showToast(toastId, data.error || '送出失敗', 'error');
    }
  } catch(e) {
    showToast(toastId, '連線失敗，請稍後再試', 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = isReply ? '送出回覆' : '送出';
  }
}

// ── 刪除確認 ──
function confirmDelete(id) {
  const actionsEl = document.querySelector(`#comment_${id} .comment-actions`);
  actionsEl.innerHTML = `
    <span class="delete-confirm">
      確定刪除？
      <button class="btn-confirm-yes" onclick="deleteComment('${id}')">刪除</button>
      <button class="btn-confirm-no"  onclick="cancelDelete('${id}')">取消</button>
    </span>`;
}

function cancelDelete(id) {
  const isReply = !!allComments.find(c => c.id === id)?.parentId;
  const actionsEl = document.querySelector(`#comment_${id} .comment-actions`);
  actionsEl.innerHTML = `
    ${!isReply ? `<button class="btn-reply" onclick="toggleReplyForm('${id}')">回覆</button>` : ''}
    <button class="btn-delete" onclick="confirmDelete('${id}')">刪除</button>`;
}

async function deleteComment(id) {
  try {
    const params = new URLSearchParams({ action:'deleteComment', id });
    const res  = await fetch(`${SCRIPT_URL}?${params}`);
    const data = await res.json();
    if (data.success) {
      await loadComments();
    } else {
      showToast('mainToast', data.error || '刪除失敗', 'error');
    }
  } catch(e) {
    showToast('mainToast', '連線失敗', 'error');
  }
}

// ── 啟動 ──
loadComments();
</script>
</body>
</html>
