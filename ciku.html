<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古風詞庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #e8e6e3;
  --ink-soft: #a8a49f;
  --ink-faint: #5a5855;
  --paper: #1a1917;
  --surface: #222120;
  --surface2: #2a2927;
  --line: #2e2d2b;
  --accent: #c4a882;
  --accent-l: #8a7560;
  --accent-dim: #3a2e20;
  --radius: 6px;
}
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.7;
  min-height: 100vh;
}

/* ── 頂部 ── */
.topbar {
  padding: 16px 20px 0;
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 10;
  border-bottom: 1px solid var(--line);
  padding-bottom: 12px;
}
.title-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 12px;
}
.title {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: .1em;
}
.count { font-size: 11px; color: var(--ink-faint); }

/* 搜尋 */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 8px 12px 8px 34px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent-l); }
.search-wrap input::placeholder { color: var(--ink-faint); }
.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--ink-faint);
  font-size: 14px;
  pointer-events: none;
}

/* 分類標籤 */
.cats {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.cat-btn {
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 11px;
  font-family: 'Noto Sans TC', sans-serif;
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.cat-btn:hover { border-color: var(--ink-faint); color: var(--ink); }
.cat-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-l); }

/* ── 詞條列表 ── */
.main { padding: 16px 20px 40px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.word-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: default;
  transition: border-color .15s, background .15s;
  animation: fadeIn .2s ease;
}
.word-card:hover {
  border-color: var(--accent-l);
  background: var(--surface2);
}
.word-text {
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: .06em;
}
.word-cat {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 99px;
  background: var(--accent-dim);
  color: var(--accent);
  margin-bottom: 6px;
}
.word-desc {
  font-size: 11px;
  color: var(--ink-soft);
  line-height: 1.6;
}
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px;
  color: var(--ink-faint);
  font-size: 13px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="title-row">
    <span class="title">古風詞庫</span>
    <span class="count" id="countLabel"></span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋詞彙或解釋…">
  </div>
  <div class="cats" id="catBar"></div>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

  {w:'素齋',c:'飲食',d:'不含葷食的齋飯'},
  {w:'瓊漿',c:'飲食',d:'美酒的雅稱，形容珍貴'},
  {w:'茶盞',c:'飲食',d:'喝茶用的小杯'},
];

const CATS = ['全部', ...new Set(WORDS.map(w => w.c))];
let activeCat = '全部';
let query = '';

function render() {
  let list = WORDS;
  if (activeCat !== '全部') list = list.filter(w => w.c === activeCat);
  if (query) {
    const q = query.toLowerCase();
    list = list.filter(w => w.w.includes(q) || w.d.includes(q));
  }
  document.getElementById('countLabel').textContent = `${list.length} 個詞`;
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty">沒有找到相關詞彙</div>';
    return;
  }
  grid.innerHTML = list.map(w => `
    <div class="word-card">
      <div class="word-text">${w.w}</div>
      <span class="word-cat">${w.c}</span>
      <div class="word-desc">${w.d}</div>
    </div>`).join('');
}

function buildCats() {
  document.getElementById('catBar').innerHTML = CATS.map(c => `
    <button class="cat-btn${c === activeCat ? ' active' : ''}"
      onclick="selectCat('${c}')">${c}</button>`).join('');
}

function selectCat(c) {
  activeCat = c;
  buildCats();
  render();
}

document.getElementById('searchInput').addEventListener('input', function() {
  query = this.value.trim();
  render();
});

buildCats();
render();
</script>
</body>
</html>
